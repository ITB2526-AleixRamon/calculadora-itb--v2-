<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora (v2) - Fase 3</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="terminal">
        <h1>>_ CALCULADORAv2 - FASE 3</h1>
        <p>> INTRODUEIX CONSUM BASE MENSUAL:</p>
        
        <div class="inputs">
            <label>Electricitat (kWh): <input type="number" id="elec" value="1000"></label>
            <label>Aigua (Litres): <input type="number" id="aigua" value="5000"></label>
            <label>Material Oficina (€): <input type="number" id="oficina" value="200"></label>
            <label>Neteja (€): <input type="number" id="neteja" value="300"></label>
        </div>
            <div id="estacionalitat-info" class="estacionalitat-tag"></div>
            <div class="dashboard-grid">
        </div>
        <div class="seasonal-controls">
            <p>> SELECCIONA PERÍODE DE DIAGNOSI:</p>
           <div class="selector-group">
            <button class="btn-estacio active" onclick="setEstacio('Anual', this)">
                🗓️ ANUAL
                <span class="btn-desc">Cicle complet (pics i tancaments)</span>
            </button>
            <button class="btn-estacio" onclick="setEstacio('Primavera', this)">
                🌸 PRIMAVERA
                <span class="btn-desc">Inclou tancament per Setmana Santa</span>
            </button>
            <button class="btn-estacio" onclick="setEstacio('Estiu', this)">
                ☀️ ESTIU
                <span class="btn-desc">Pic hídric i tancament a l'agost</span>
            </button>
            <button class="btn-estacio" onclick="setEstacio('Tardor', this)">
                🍁 TARDOR
                <span class="btn-desc">Inici de curs (pic en materials)</span>
            </button>
            <button class="btn-estacio" onclick="setEstacio('Hivern', this)">
                ❄️ HIVERN
                <span class="btn-desc">Pic calefacció i tancament Nadal</span>
            </button>
        </div>
        </div>
        <div class="botons-container">
            <button onclick="executarDiagnostic()">Executar Diagnòstic</button>
            <button onclick="aplicarMillores()">Aplicar Reducció ASG -30%</button>
        </div>

    <div id="resultats" class="hidden">
        <h2>>_ DIAGNÒSTIC ASG GENERAT:</h2>
        <div class="dashboard-grid">
            <div class="chart-container"><canvas id="recursosChart"></canvas></div>
            <div class="chart-container"><canvas id="economicChart"></canvas></div>
        </div>
        <div id="output-resum"></div>
        <div id="estalvi-real-container"></div> 
    </div>

        <div id="cronograma-container"></div>
        
        <div class="credits">
            >_ © Erik P. | Steven R. | Aleix R. - ITB
        </div>
    </div>
    
    <script src="js/calculadora.js"></script>
</body>
</html>
